name: Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  test:
    runs-on: ${{ matrix.config.os }}
    
    name: Test ${{ matrix.config.os }} (${{ matrix.config.r }})
    
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest, r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: macOS-latest, r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::tinytest, any::data.table, any::Rcpp
          needs: |
            tinytest
            data.table
            Rcpp

      - name: Install system dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install system dependencies on Windows
        if: runner.os == 'Windows'
        run: |
          # Ensure Rtools is available for compilation
          Rscript -e "if (!('pkgbuild' %in% installed.packages()[,'Package'])) install.packages('pkgbuild'); pkgbuild::check_rtools()"

      - name: Install package
        run: R CMD INSTALL .
        shell: bash

      - name: Debug package installation
        run: |
          Rscript -e "
          cat('=== DEBUGGING PACKAGE INSTALLATION ===\n')
          library(CKutils)
          cat('Package loaded successfully\n')
          cat('Test directory:', system.file('tinytest', package = 'CKutils'), '\n')
          test_files <- list.files(system.file('tinytest', package = 'CKutils'), pattern = '\\.R$', full.names = TRUE)
          cat('Test files found:', length(test_files), '\n')
          if (length(test_files) > 0) {
            cat('Test files:\n')
            for (f in test_files) cat('  ', basename(f), '\n')
          }
          
          # Test basic functionality that uses C++ code
          tryCatch({
            library(data.table)
            dt <- data.table(a = 1:5, b = letters[1:5])
            result <- CKutils:::fct_to_int_cpp(factor(letters[1:3]))
            cat('C++ function test passed\n')
          }, error = function(e) {
            cat('C++ function test failed:', e$message, '\n')
          })
          "
        shell: bash

      - name: Run tinytest tests
        run: |
          Rscript -e "
          library(tinytest)
          library(CKutils)
          
          # Check if tinytest directory exists
          test_dir <- system.file('tinytest', package = 'CKutils')
          if (test_dir == '') {
            cat('No tinytest directory found, checking inst/tinytest\n')
            test_dir <- system.file('inst', 'tinytest', package = 'CKutils')
          }
          
          if (test_dir == '') {
            cat('WARNING: No tinytest directory found, skipping tests\n')
            quit(status = 0)
          }
          
          cat('Using test directory:', test_dir, '\n')
          
          # Run all tests and capture results
          results <- test_package('CKutils')
          
          # Print summary
          cat('\n=== TINYTEST RESULTS ===\n')
          print(results)
          
          # Check if any tests were actually run
          if (length(results) == 0) {
            cat('WARNING: No tests were found or run\n')
            # Try running tests directly from files
            test_files <- list.files(test_dir, pattern = '\\.R$', full.names = TRUE)
            if (length(test_files) > 0) {
              cat('Attempting to run test files directly:\n')
              all_results <- list()
              for (tf in test_files) {
                cat('Running', basename(tf), '\n')
                tryCatch({
                  file_results <- run_test_file(tf)
                  all_results <- c(all_results, file_results)
                  cat('  -', length(file_results), 'tests from', basename(tf), '\n')
                }, error = function(e) {
                  cat('  - Error in', basename(tf), ':', e$message, '\n')
                })
              }
              results <- unlist(all_results)
            }
          }
          
          if (length(results) == 0) {
            cat('No tests could be run - this may indicate a test discovery issue\n')
            quit(status = 1)
          }
          
          # Check for test failures
          failed_tests <- results[!is.na(results) & results == FALSE]
          if (length(failed_tests) > 0) {
            cat('\n=== FAILED TESTS ===\n')
            print(failed_tests)
            stop('Some tests failed!')
          } else {
            cat('\nAll tests passed successfully!\n')
            cat('Total tests run:', length(results), '\n')
          }
          "
        shell: bash

      - name: Run specific dt_ops tests
        run: |
          Rscript -e "
          library(tinytest)
          library(CKutils)
          
          # Run dt_ops tests specifically
          cat('\n=== RUNNING dt_ops.R TESTS ===\n')
          dt_ops_results <- run_test_file(system.file('tinytest', 'test-dt_ops.R', package = 'CKutils'))
          
          cat('dt_ops.R tests:', length(dt_ops_results), 'tests run\n')
          
          # Check for failures
          if (any(!is.na(dt_ops_results) & dt_ops_results == FALSE)) {
            stop('dt_ops.R tests failed!')
          } else {
            cat('All dt_ops.R tests passed!\n')
          }
          "
        shell: bash
